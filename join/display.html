<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapin HS · Computer Science · Display</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    cursor: none;
  }

  /* ─── stage ───────────────────────────────── */
  .stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  /* Background image layer — crossfades between slides */
  .bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transform: scale(1.04);
    transition: opacity 1.2s ease, transform 14s linear;
    will-change: opacity, transform;
  }
  .bg.active {
    opacity: 1;
    transform: scale(1.0);
  }

  /* Vignette + left-side darkening so text reads on top of any image */
  .stage::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.55) 40%, rgba(0,0,0,0.0) 80%),
      linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,0) 75%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* Subtle CRT scanlines */
  .scanlines {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg,
      rgba(0, 255, 255, 0.025) 0px,
      rgba(0, 255, 255, 0.025) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 4;
    mix-blend-mode: overlay;
  }

  /* Animated grid floor */
  .grid-floor {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 35vh;
    background-image:
      linear-gradient(rgba(255, 0, 110, 0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 217, 255, 0.15) 1px, transparent 1px);
    background-size: 60px 60px;
    transform: perspective(400px) rotateX(60deg);
    transform-origin: bottom center;
    animation: grid-scroll 6s linear infinite;
    opacity: 0.35;
    pointer-events: none;
    z-index: 2;
    mask-image: linear-gradient(to top, #000 30%, transparent 100%);
    -webkit-mask-image: linear-gradient(to top, #000 30%, transparent 100%);
  }
  @keyframes grid-scroll {
    from { background-position: 0 0, 0 0; }
    to   { background-position: 0 60px, 0 0; }
  }

  /* ─── HUD ─────────────────────────────────── */
  .hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 40px;
    z-index: 10;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.65);
  }
  .hud .brand strong { color: #fff; font-weight: 900; }
  .hud .right { display: flex; gap: 22px; align-items: center; }
  .hud .right .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #06d6a0;
    box-shadow: 0 0 12px #06d6a0;
    animation: blink 2s infinite;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0.3; }
  }
  .hud .right .clock { color: #00d9ff; }

  /* ─── content ─────────────────────────────── */
  .content {
    position: absolute;
    left: 5vw;
    top: 50%;
    transform: translateY(-50%);
    max-width: 70vw;
    z-index: 5;
  }

  .eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 1.5vw;
    letter-spacing: 0.5vw;
    color: #00d9ff;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    margin-bottom: 1.5vh;
    text-shadow: 0 0 12px rgba(0, 217, 255, 0.5);
  }
  .eyebrow.in { opacity: 0.95; transform: translateY(0); }

  .headline {
    font-family: 'Arial Black', 'Impact', sans-serif;
    font-size: 9vw;
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -0.25vw;
    color: #fff;
    text-shadow:
      -6px 0 0 rgba(255, 0, 60, 0.95),
       6px 0 0 rgba(0, 217, 255, 0.95),
       0 0 40px rgba(255,255,255,0.3);
    opacity: 0;
    transform: translateY(30px) scale(0.98);
    transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    margin-bottom: 2.5vh;
    max-width: 60vw;
  }
  .headline.medium { font-size: 6.5vw; }
  .headline.small { font-size: 5vw; }
  .headline.in {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  .sub {
    font-size: 1.8vw;
    font-weight: 500;
    color: rgba(255,255,255,0.88);
    max-width: 55vw;
    line-height: 1.4;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
    margin-bottom: 4vh;
  }
  .sub.in { opacity: 1; transform: translateY(0); }

  .terminal {
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid rgba(0, 217, 255, 0.35);
    border-radius: 10px;
    padding: 2vh 2vw;
    max-width: 55vw;
    font-family: 'Courier New', 'Menlo', monospace;
    font-size: 1.5vw;
    line-height: 1.7;
    color: #e0f7ff;
    opacity: 0;
    transform: translateY(15px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 30px rgba(0, 217, 255, 0.1);
    white-space: pre;
    min-height: 8vh;
  }
  .terminal.in { opacity: 1; transform: translateY(0); }
  .terminal .cmt { color: #6b7280; font-style: italic; }
  .terminal .kw  { color: #00d9ff; }
  .terminal .fn  { color: #ff7afc; }
  .terminal .str { color: #b6ff70; }
  .terminal .num { color: #ffd166; }
  .terminal .cursor {
    display: inline-block;
    width: 0.7em;
    height: 1.1em;
    background: #00d9ff;
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: cursor-blink 1s steps(2, end) infinite;
    box-shadow: 0 0 8px #00d9ff;
  }
  @keyframes cursor-blink {
    50% { opacity: 0; }
  }

  /* fade everything out on slide transition */
  .content.exiting .eyebrow,
  .content.exiting .headline,
  .content.exiting .sub,
  .content.exiting .terminal {
    opacity: 0;
    transform: translateY(-20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  /* ─── footer / progress ───────────────────── */
  .footer {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 24px 40px;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.6);
  }
  .footer .cta {
    font-weight: 900;
    color: #fff;
    letter-spacing: 6px;
    font-size: 14px;
  }
  .footer .cta strong { color: #ff006e; }

  .progress {
    flex: 1;
    margin: 0 40px;
    height: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .progress .bar {
    position: absolute;
    inset: 0 100% 0 0;
    background: linear-gradient(90deg, #ff006e, #00d9ff);
    transition: right linear;
    box-shadow: 0 0 12px rgba(0, 217, 255, 0.5);
  }

  /* Slide counter dots */
  .dots {
    display: flex;
    gap: 6px;
  }
  .dots .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s, transform 0.3s;
  }
  .dots .dot.active {
    background: #00d9ff;
    box-shadow: 0 0 8px #00d9ff;
    transform: scale(1.4);
  }

  /* Fullscreen prompt — fades away after a few seconds or on click */
  .fs-prompt {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    background: rgba(0, 217, 255, 0.15);
    border: 1px solid rgba(0, 217, 255, 0.4);
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: #00d9ff;
    cursor: pointer;
    transition: opacity 0.5s ease;
    pointer-events: auto;
  }
  .fs-prompt.hidden { opacity: 0; pointer-events: none; }

  /* Glitch transition between slides */
  .glitch-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 217, 255, 0.05);
    mix-blend-mode: difference;
    opacity: 0;
    pointer-events: none;
    z-index: 6;
  }
  .glitch-overlay.flash {
    animation: glitch-flash 0.5s ease;
  }
  @keyframes glitch-flash {
    0% { opacity: 0; transform: translateX(0); }
    20% { opacity: 0.8; transform: translateX(-6px); }
    40% { opacity: 0.3; transform: translateX(8px); }
    60% { opacity: 0.6; transform: translateX(-3px); }
    100% { opacity: 0; transform: translateX(0); }
  }
</style>
</head>

  // ───── slide engine ─────────────────────────
  const els = {
    bgA: document.getElementById('bg-a'),
    bgB: document.getElementById('bg-b'),
    eyebrow: document.getElementById('eyebrow'),
    headline: document.getElementById('headline'),
    sub: document.getElementById('sub'),
    terminal: document.getElementById('terminal'),
    content: document.getElementById('content'),
    glitch: document.getElementById('glitch'),
    progressBar: document.getElementById('progress-bar'),
    dots: document.getElementById('dots'),
    clock: document.getElementById('clock'),
  };

  // Build the dot indicators
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    els.dots.appendChild(d);
  });
  const dotEls = [...els.dots.children];

  // Preload all images
  Object.values(IMG).forEach(src => { const img = new Image(); img.src = src; });

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  // Typewriter for the terminal — types each segment char-by-char with class applied
  async function typeTerminal(segments, charDelay = 28) {
    els.terminal.innerHTML = '';
    // Add a cursor we'll move along
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    els.terminal.appendChild(cursor);

    for (const seg of segments) {
      const span = document.createElement('span');
      if (seg.c) span.className = seg.c;
      els.terminal.insertBefore(span, cursor);
      for (const ch of seg.t) {
        span.textContent += ch;
        await sleep(charDelay);
      }
    }
  }

  // Active background tracking — alternate between bgA and bgB for crossfades
  let bgActive = els.bgA;
  let bgInactive = els.bgB;

  function setBackground(src) {
    bgInactive.style.backgroundImage = `url('${src}')`;
    // Force reflow before transitioning so the new bg is in place
    void bgInactive.offsetWidth;
    bgInactive.classList.add('active');
    bgActive.classList.remove('active');
    [bgActive, bgInactive] = [bgInactive, bgActive];
  }

  function flashGlitch() {
    els.glitch.classList.remove('flash');
    void els.glitch.offsetWidth;
    els.glitch.classList.add('flash');
  }

  function updateDots(index) {
    dotEls.forEach((d, i) => d.classList.toggle('active', i === index));
  }

  // Calculate how long each slide should hold based on code length + base time
  function slideDuration(slide) {
    const codeLen = slide.code.reduce((n, s) => n + s.t.length, 0);
    const typeMs = codeLen * 28;
    return 4500 + typeMs + 5500; // intro buffer + typing + hold
  }

  async function runSlide(slide, index) {
    updateDots(index);

    // Set new background
    flashGlitch();
    setBackground(slide.image);

    // Set headline size class
    els.headline.className = 'headline';
    if (slide.headlineSize === 'medium') els.headline.classList.add('medium');
    if (slide.headlineSize === 'small')   els.headline.classList.add('small');

    // Inject text content
    els.eyebrow.textContent = slide.eyebrow;
    els.headline.textContent = slide.headline;
    els.sub.textContent = slide.sub;
    els.terminal.innerHTML = '';

    // Stagger reveal: eyebrow → headline → sub → terminal
    await sleep(400);
    els.eyebrow.classList.add('in');
    await sleep(350);
    els.headline.classList.add('in');
    await sleep(550);
    els.sub.classList.add('in');
    await sleep(450);
    els.terminal.classList.add('in');

    await sleep(250);
    // Start the typewriter
    const typingPromise = typeTerminal(slide.code);

    // Start the progress bar
    const dur = slideDuration(slide);
    els.progressBar.style.transition = 'none';
    els.progressBar.style.right = '100%';
    void els.progressBar.offsetWidth;
    els.progressBar.style.transition = `right ${dur}ms linear`;
    els.progressBar.style.right = '0%';

    await typingPromise;

    // Hold while remaining time elapses
    const elapsed = 400 + 350 + 550 + 450 + 250 + (typingPromise ? 0 : 0);
    // Simpler: just wait until total duration has been spent since runSlide started.
    // We'll use the progress bar timing as the gate by waiting an additional 4500ms past type completion.
    await sleep(4500);

    // Exit
    els.content.classList.add('exiting');
    els.eyebrow.classList.remove('in');
    els.headline.classList.remove('in');
    els.sub.classList.remove('in');
    els.terminal.classList.remove('in');
    await sleep(700);
    els.content.classList.remove('exiting');
  }

  async function loop() {
    let i = 0;
    while (true) {
      await runSlide(slides[i], i);
      i = (i + 1) % slides.length;
    }
  }

  // ───── clock ────────────────────────────────
  function updateClock() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    els.clock.textContent = `${hh}:${mm}`;
  }
  updateClock();
  setInterval(updateClock, 30_000);

  // ───── fullscreen ───────────────────────────
  function enterFullscreen() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    document.getElementById('fs-prompt').classList.add('hidden');
  }
  // Auto-hide the prompt after 8 seconds
  setTimeout(() => document.getElementById('fs-prompt').classList.add('hidden'), 8000);
  // Re-show on mouse move
  document.addEventListener('mousemove', () => {
    document.getElementById('fs-prompt').classList.remove('hidden');
    clearTimeout(window._fsTimer);
    window._fsTimer = setTimeout(() => document.getElementById('fs-prompt').classList.add('hidden'), 5000);
  });

  // ───── go ───────────────────────────────────
  loop();
</script>

</body>
