<!DOCTYPE html>
<!-- Published. No-tape floor kit for Sorting Networks: chair signs (IN/OUT/COMPARE) + lay-down arrow tiles. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorting Network Floor Kit &mdash; Bridge Camp</title>
    <style>
      * { box-sizing: border-box; }
      html, body { background:#fff; }
      body {
        font-family:"Segoe UI", Arial, sans-serif; color:#111;
        max-width:8in; margin:0 auto; padding:0.3in 0.35in 0.5in;
        -webkit-print-color-adjust:exact; print-color-adjust:exact;
      }
      .toolbar { background:#111; color:#fff; padding:10px 14px; border-radius:6px; display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
      .toolbar button { font-size:13px; padding:7px 16px; border:0; border-radius:5px; background:#4f46e5; color:#fff; cursor:pointer; }
      .toolbar .hint { font-size:12px; max-width:74%; }
      .secthead { grid-column:1 / -1; font-size:12pt; font-weight:700; color:#4338ca; border-bottom:2px solid #c7d2fe; padding-bottom:4px; margin:4px 0 2px; }
      .secthead.brk { page-break-before: always; }
      .grid { display:grid; grid-template-columns:1fr 1fr; gap:0; }
      .tile { border:2px dashed #888; height:3.3in; padding:10px 12px; page-break-inside:avoid; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
      .tile .cap { font-size:9pt; font-weight:700; color:#94a3b8; letter-spacing:.5px; align-self:flex-start; }
      .io .big { font-size:150pt; font-weight:800; line-height:1; }
      .io .ioword { font-size:30pt; font-weight:800; letter-spacing:2px; }
      .cmp .circle { width:78px; height:78px; border:5px solid #111; border-radius:50%; margin-bottom:8px; }
      .cmp .title { font-size:19pt; font-weight:800; margin-bottom:8px; }
      .cmp .dir { font-size:14pt; font-weight:700; margin:3px 0; }
      .cmp .dir .ar { font-size:22pt; vertical-align:middle; }
      .cmp .sm { color:#15803d; }
      .cmp .lg { color:#b91c1c; }
      .arrow .glyph { font-size:150pt; line-height:1; font-weight:900; }
      .ar-ur .glyph { transform:rotate(-45deg); }
      .ar-dr .glyph { transform:rotate(45deg); }
      @media print { .no-print { display:none !important; } body { padding:0; } }
    </style>
  </head>
  <body>
    <div class="toolbar no-print">
      <span class="hint"><strong>Floor kit</strong> &mdash; print, cut along the dashed lines, and set on chairs / lay on the floor. <b>No tape needed.</b> Print only what you need (you may not use all 12 COMPARE signs; arrows are optional).</span>
      <button onclick="window.print()">&#128424; Print</button>
    </div>
    <div class="grid" id="grid"></div>

    <script>
      var grid = document.getElementById('grid');
      function head(t, brk){ return '<div class="secthead'+(brk?' brk':'')+'">'+t+'</div>'; }
      function io(word, n){
        return '<div class="tile io"><span class="cap">place on a chair</span>'
          + '<div class="ioword">'+word+'</div><div class="big">'+n+'</div></div>';
      }
      function compare(){
        return '<div class="tile cmp"><span class="cap">place on a node chair</span>'
          + '<div class="circle"></div>'
          + '<div class="title">COMPARE</div>'
          + '<div class="dir sm"><span class="ar">&#8592;</span> smaller # &mdash; go LEFT</div>'
          + '<div class="dir lg">larger # &mdash; go RIGHT <span class="ar">&#8594;</span></div></div>';
      }
      function arrow(cls){
        return '<div class="tile arrow '+cls+'"><span class="cap">lay on the floor</span>'
          + '<div class="glyph">&#10142;</div></div>';
      }
      var html = '';
      html += head('IN signs &mdash; the 6 left-hand chairs');
      for (var i=1;i<=6;i++) html += io('IN', i);
      html += head('OUT signs &mdash; the 6 right-hand chairs', true);
      for (var j=1;j<=6;j++) html += io('OUT', j);
      html += head('COMPARE signs &mdash; one per middle (node) chair', true);
      for (var k=0;k<12;k++) html += compare();
      html += head('Arrow tiles &mdash; lay along the lines (optional)', true);
      var dirs = ['ar-r','ar-r','ar-r','ar-r','ar-ur','ar-ur','ar-dr','ar-dr','ar-r','ar-ur','ar-dr','ar-r'];
      for (var a=0;a<dirs.length;a++) html += arrow(dirs[a]);
      grid.innerHTML = html;
    </script>
  </body>
</html>
